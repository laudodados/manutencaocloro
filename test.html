<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <title>Gerador de Laudo Técnico - Geradores de Cloro</title>
  <style>
    /* --- ESTILO GERAL E CORES --- */
    :root {
      --cor-primaria: #007bff;
      --cor-fundo: #8ad6cf;
      --cor-card: #ffffff;
      --cor-borda: #dee2e6;
      --cor-sombra: rgba(0, 0, 0, 0.1);
      --cor-texto: #495057;
      --cor-titulo: #212529;
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: var(--cor-fundo);
      color: var(--cor-texto);
    }

    /* --- ESTRUTURA DO FORMULÁRIO --- */
    .form-section {
      border: 1px solid var(--cor-borda); 
      padding: 20px; 
      margin: 20px 0; 
      border-radius: 8px; 
      background-color: var(--cor-card);
      box-shadow: 0 4px 8px var(--cor-sombra);
    }

    .form-group {
      margin-bottom: 15px;
    }

    label, .form-group > span {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }

    input[type="text"], input[type="date"], input[type="time"], select, textarea {
      width: 100%;
      padding: 12px 15px; 
      border-radius: 8px;
      border: 1px solid var(--cor-borda);
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      resize: vertical;
    }

    .checkbox-group label {
      display: inline-flex;
      width: auto;
      margin-right: 20px;
      font-weight: normal;
    }

    /* --- BOTÃO PRINCIPAL --- */
    #btnGerarLaudo {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s ease-in-out;
    }
    #btnGerarLaudo:hover {
      background-color: #218838;
    }

    /* --- SEÇÃO DE PEÇAS --- */
    .peca-img {
      width: 90px; height: 90px; margin-right: 15px; object-fit: cover;
      border-radius: 8px; border: 1px solid var(--cor-borda);
    }
    #pecasLista label {
      display: flex; width: 100%; align-items: center; margin-bottom: 10px;
      padding: 10px; border-radius: 8px; border: 1px solid transparent;
      transition: background-color 0.2s ease-in-out, border-color 0.2s ease-in-out;
    }
    #pecasLista label:hover {
      background-color: #f8f9fa; border-color: var(--cor-borda);
    }
    #pecasLista h4 {
      margin-top: 20px; margin-bottom: 15px; padding-bottom: 8px;
      border-bottom: 2px solid var(--cor-primaria); color: var(--cor-titulo);
    }
    #pecasLista h4:first-child { margin-top: 0; }
    
    .peca-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 15px;
      align-items: center;
      margin-bottom: 15px;
    }

    .opcoes-peca {
      display: none;
      align-items: center;
      gap: 20px;
    }

    .cor-selecao {
      display: flex;
      gap: 5px;
      border: 1px solid var(--cor-borda);
      padding: 5px;
      border-radius: 8px;
      background-color: #f8f9fa;
    }

    .cor-selecao label {
      font-weight: normal;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 4px;
      border: 1px solid transparent;
      transition: all 0.2s ease-in-out;
    }

    .cor-selecao label:hover {
      background-color: #e9ecef;
    }

    .cor-selecao input[value="verde"]:checked + label {
      background-color: #d4edda; color: #155724; border-color: #b1dfbb; font-weight: bold;
    }
    .cor-selecao input[value="azul"]:checked + label {
      background-color: #cce5ff; color: #004085; border-color: #b8daff; font-weight: bold;
    }
    .cor-selecao input[value="rosa"]:checked + label {
      background-color: #ebacdd; color: #ed3cc5; border-color: #f5c6cb; font-weight: bold;
    }

    .cor-selecao input[type="radio"] { display: none; }

    .quantidade-label {
      display: flex; align-items: center; gap: 8px; font-weight: normal;
    }
    .quantidade-input {
      width: 40px; padding: 8px; text-align: center;
    }

    .peca-info-texto {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .estoque-badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      border: 1px solid var(--cor-borda);
      background-color: #eef2f7;
      color: #334155;
    }

    .peca-item.estoque-baixo .estoque-badge {

      border-color: #ffecb5;
      color: #664d03;
    }

    }

const ESTOQUE_XML_URL = 'datastock.xml';
const LIMITE_ESTOQUE_BAIXO = 2;
const CHAVE_ESTOQUE_LOCAL = 'geradorLaudoEstoqueDiario';
let estoquePorProduto = {};
let estoqueCarregado = false;

function normalizarCodigoProduto(codigo) {
    return String(codigo || '').trim();
}

function normalizarNumeroEstoque(valor) {
    const numero = Number(String(valor || '0').replace(/\./g, '').replace(',', '.'));
    return Number.isFinite(numero) ? numero : 0;
}

function formatarQuantidadeEstoque(valor) {
    if (valor === null || valor === undefined) return 'N/I';
    return Number(valor).toLocaleString('pt-BR', { maximumFractionDigits: 2 });
}

function obterEstoqueProduto(codigo) {
    const codigoNormalizado = normalizarCodigoProduto(codigo);
    if (!codigoNormalizado || !estoqueCarregado) return null;
    if (Object.prototype.hasOwnProperty.call(estoquePorProduto, codigoNormalizado)) {
        return estoquePorProduto[codigoNormalizado];
    }
    const codigoSemZeros = codigoNormalizado.replace(/^0+/, '');
    if (Object.prototype.hasOwnProperty.call(estoquePorProduto, codigoSemZeros)) {
        return estoquePorProduto[codigoSemZeros];
    }
    const codigoComZeros = codigoNormalizado.padStart(6, '0');
    if (Object.prototype.hasOwnProperty.call(estoquePorProduto, codigoComZeros)) {
        return estoquePorProduto[codigoComZeros];
    }
    return 0;
}

function classeEstoque(quantidade) {
    if (quantidade === null || quantidade === undefined) return '';
    if (quantidade <= 0) return 'estoque-zerado';
    if (quantidade <= LIMITE_ESTOQUE_BAIXO) return 'estoque-baixo';
    return '';
}

function textoEstoque(quantidade) {
    if (quantidade === null || quantidade === undefined) return 'Estoque: N/I';
    return `Estoque: ${formatarQuantidadeEstoque(quantidade)}`;
}

function parseEstoqueXml(xmlTexto) {
    const xml = new DOMParser().parseFromString(xmlTexto, 'application/xml');
    if (xml.querySelector('parsererror')) {
        throw new Error('Arquivo XML invalido.');
    }

    const linhas = Array.from(xml.getElementsByTagName('Row'));
    const mapa = {};
    let indiceProduto = -1;
    let indiceQuantidade = -1;

    linhas.forEach(linha => {
        const valores = [];
        Array.from(linha.getElementsByTagName('Cell')).forEach(celula => {
            const indexAttr = celula.getAttribute('ss:Index') || celula.getAttributeNS('urn:schemas-microsoft-com:office:spreadsheet', 'Index');
            if (indexAttr) {
                valores.length = Number(indexAttr) - 1;
            }
            const data = celula.getElementsByTagName('Data')[0];
            valores.push(data ? data.textContent.trim() : '');
        });

        if (indiceProduto === -1 || indiceQuantidade === -1) {
            const cabecalhos = valores.map(valor => valor.trim().toLowerCase());
            indiceProduto = cabecalhos.findIndex(valor => valor === 'produto');
            indiceQuantidade = cabecalhos.findIndex(valor => valor === 'quantidade');
            return;
        }

        const produto = normalizarCodigoProduto(valores[indiceProduto]);
        if (!produto) return;
        const quantidade = normalizarNumeroEstoque(valores[indiceQuantidade]);
        mapa[produto] = (mapa[produto] || 0) + quantidade;
    });

    return mapa;
}

function aplicarEstoqueNasPecas() {
    document.querySelectorAll('.peca-item').forEach(item => {
        const checkbox = item.querySelector('input[type="checkbox"]');
        const badge = item.querySelector('.estoque-badge');
        if (!checkbox || !badge) return;

        item.classList.remove('estoque-baixo', 'estoque-zerado');
        const estoque = obterEstoqueProduto(checkbox.value);
        checkbox.dataset.estoque = estoque === null ? '' : String(estoque);
        badge.textContent = textoEstoque(estoque);

        const classe = classeEstoque(estoque);
        if (classe) item.classList.add(classe);
    });
}

function carregarEstoqueDeTexto(xmlTexto, origem) {
    estoquePorProduto = parseEstoqueXml(xmlTexto);
    estoqueCarregado = true;
    salvarEstoqueLocal(origem);
    aplicarEstoqueNasPecas();
}

function salvarEstoqueLocal(origem) {
    try {
        localStorage.setItem(CHAVE_ESTOQUE_LOCAL, JSON.stringify({
            origem: origem,
            salvoEm: new Date().toISOString(),
            estoque: estoquePorProduto
        }));
    } catch (erro) {
        console.warn('Nao foi possivel salvar o estoque no navegador.', erro);
    }
}

function carregarEstoqueLocal() {
    try {
        const salvo = localStorage.getItem(CHAVE_ESTOQUE_LOCAL);
        if (!salvo) return false;

        const dados = JSON.parse(salvo);
        if (!dados || !dados.estoque) return false;

        estoquePorProduto = dados.estoque;
        estoqueCarregado = true;
        aplicarEstoqueNasPecas();

        return true;
    } catch (erro) {
        console.warn('Nao foi possivel carregar o estoque salvo no navegador.', erro);
        return false;
    }
}

function montarUrlEstoqueOnline() {
    const separador = ESTOQUE_XML_URL.includes('?') ? '&' : '?';
    return `${ESTOQUE_XML_URL}${separador}v=${Date.now()}`;
}

fetch(montarUrlEstoqueOnline(), { cache: 'no-store' })
    .then(resposta => resposta.ok ? resposta.text() : Promise.reject())
    .then(texto => carregarEstoqueDeTexto(texto, ESTOQUE_XML_URL))
    .catch(() => {
        carregarEstoqueLocal();
    });

                    </div>
                </div>
                </div>

        if (pecasDoModelo[primeiraChave] && typeof pecasDoModelo[primeiraChave].nome === 'undefined') {
        for (const [nomeCategoria, pecasDaCategoria] of Object.entries(pecasDoModelo)) {

            for (const [codigo, peca] of Object.entries(pecasDaCategoria)) {

    if (tipo && tabelaServicosGerador[tipo]) {

            selectServico.appendChild(option);
        });

function togglePecaOpcoes(checkbox) {

// Lógica para preview das imagens
const imagensParaLaudo = [];
document.getElementById("fotos").addEventListener("change", function(event) {
    const preview = document.getElementById("previewFotos");
    preview.innerHTML = "";
    imagensParaLaudo.length = 0; 

    for (const file of event.target.files) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = document.createElement("img");
            img.src = e.target.result;
            img.classList.add("preview-img");
            preview.appendChild(img);
            imagensParaLaudo.push(e.target.result); 
        }
        reader.readAsDataURL(file);
    }
});
